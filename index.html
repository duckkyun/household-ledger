<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#4f46e5" />
<title>가계부</title>
<script>/* 로드 직후 저장된 테마 적용 → 깜빡임 방지 */try{var _t=localStorage.getItem("household-ledger-theme");if(_t)document.documentElement.setAttribute("data-theme",_t);}catch(e){}</script>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel-2:#1f2430; --line:#2a3040;
    --text:#e7e9ee; --muted:#9aa3b2; --brand:#6366f1; --brand-2:#818cf8;
    --expense:#f87171; --income:#34d399; --shadow:0 8px 30px rgba(0,0,0,.35);
    --radius:16px;
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f4f5f8; --panel:#ffffff; --panel-2:#f7f8fb; --line:#e6e8ef;
      --text:#1b1f2a; --muted:#6b7280; --shadow:0 8px 30px rgba(20,24,40,.08);
    }
  }
  /* 토글로 수동 지정하면 시스템 설정보다 우선 */
  html[data-theme="dark"]{
    --bg:#0f1117; --panel:#171a23; --panel-2:#1f2430; --line:#2a3040;
    --text:#e7e9ee; --muted:#9aa3b2; --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  html[data-theme="light"]{
    --bg:#f4f5f8; --panel:#ffffff; --panel-2:#f7f8fb; --line:#e6e8ef;
    --text:#1b1f2a; --muted:#6b7280; --shadow:0 8px 30px rgba(20,24,40,.08);
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",Segoe UI,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .wrap{max-width:760px; margin:0 auto; padding:16px 16px 96px;}
  header.top{display:flex; align-items:center; justify-content:space-between; gap:12px; row-gap:10px; flex-wrap:wrap; padding:8px 2px 16px;}
  .brand{display:flex; align-items:center; gap:10px; font-weight:800; font-size:20px; letter-spacing:-.02em;}
  .brand .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:grid;place-items:center;font-size:15px}
  .hgroup{display:flex; align-items:center; gap:8px;}
  .icon-btn{background:var(--panel); border:1px solid var(--line); color:var(--text); width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:15px;line-height:1}
  .month-nav{display:flex; align-items:center; gap:6px;}
  .month-nav button{background:var(--panel); border:1px solid var(--line); color:var(--text); width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:16px}
  .month-nav .label{min-width:104px;text-align:center;font-weight:700;font-variant-numeric:tabular-nums}
  button{font-family:inherit}
  button:active{transform:translateY(1px)}

  .cards{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow);}
  .card .k{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
  .card .v{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .card.exp .v{color:var(--expense)} .card.inc .v{color:var(--income)}
  @media (max-width:560px){ .card .v{font-size:16px} .wrap{padding-left:12px;padding-right:12px} }

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-bottom:16px;}
  .panel h2{margin:0 0 12px; font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px}
  .panel h2 .sub{font-weight:500;color:var(--muted);font-size:12px}

  /* form */
  .seg{display:flex; background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:4px; gap:4px; margin-bottom:12px}
  .seg button{flex:1; border:0; background:transparent; color:var(--muted); padding:9px; border-radius:9px; font-weight:700; cursor:pointer}
  .seg button.active[data-t="expense"]{background:var(--expense); color:#fff}
  .seg button.active[data-t="income"]{background:var(--income); color:#04241a}
  .row{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px}
  @media (max-width:560px){ .row{grid-template-columns:1fr} }
  input,select,textarea{width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:11px; padding:11px 12px; font-size:15px; outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--brand)}
  input[type=number]{font-variant-numeric:tabular-nums}
  .chips{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:10px}
  .chip{border:1px solid var(--line); background:var(--panel-2); color:var(--text); padding:7px 11px; border-radius:999px; cursor:pointer; font-size:13px; font-weight:600}
  .chip.active{background:var(--brand); border-color:var(--brand); color:#fff}
  .form-actions{display:flex; gap:8px}
  .btn-add{flex:1; border:0; background:linear-gradient(135deg,var(--brand),var(--brand-2)); color:#fff; padding:13px; border-radius:12px; font-weight:800; font-size:15px; cursor:pointer}
  .btn-cancel{border:1px solid var(--line); background:var(--panel-2); color:var(--muted); padding:13px 18px; border-radius:12px; font-weight:700; font-size:14px; cursor:pointer}
  .editing-banner{background:var(--panel-2); border:1px dashed var(--brand); color:var(--muted); border-radius:11px; padding:8px 12px; font-size:12.5px; margin-bottom:10px}

  /* list */
  .daygroup{margin-bottom:14px}
  .daygroup .dh{display:flex; justify-content:space-between; align-items:baseline; padding:0 2px 6px; border-bottom:1px dashed var(--line); margin-bottom:6px}
  .daygroup .dh .d{font-weight:700;font-size:13px}
  .daygroup .dh .s{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .item{display:flex; align-items:center; gap:12px; padding:9px 4px; border-radius:10px; cursor:pointer}
  .item:hover{background:var(--panel-2)}
  .item.editing{background:var(--panel-2); box-shadow:inset 0 0 0 1.5px var(--brand)}
  .item .emoji{width:34px;height:34px;border-radius:10px;background:var(--panel-2);display:grid;place-items:center;font-size:17px;flex:none}
  .item .meta{flex:1;min-width:0}
  .item .meta .c{font-weight:600;font-size:14px}
  .item .meta .m{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item .amt{font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
  .item .amt.expense{color:var(--expense)} .item .amt.income{color:var(--income)}
  .item .del{border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 6px;border-radius:8px;flex:none}
  .item .del:hover{background:var(--expense);color:#fff}
  .empty{text-align:center;color:var(--muted);padding:26px 0;font-size:14px}

  /* stats */
  .statrow{display:flex; align-items:center; gap:10px; margin-bottom:9px}
  .statrow .lab{width:96px;flex:none;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
  .statrow .bar{flex:1;height:12px;background:var(--panel-2);border-radius:999px;overflow:hidden}
  .statrow .bar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--brand),var(--brand-2))}
  .statrow .val{width:118px;flex:none;text-align:right;font-size:12.5px;font-variant-numeric:tabular-nums;color:var(--muted)}
  .statrow .val b{color:var(--text)}
  @media (max-width:560px){ .statrow .lab{width:78px} .statrow .val{width:96px} }

  /* trend chart */
  .trend{width:100%; height:150px; display:block}
  .trend .gl{stroke:var(--line);stroke-width:1}
  .trend text{fill:var(--muted);font-size:10px}

  .tools{display:flex; flex-wrap:wrap; gap:8px}
  .tools button, .tools label{border:1px solid var(--line); background:var(--panel-2); color:var(--text); padding:9px 13px; border-radius:11px; cursor:pointer; font-size:13px; font-weight:600}
  .tools .danger:hover{background:var(--expense);color:#fff;border-color:var(--expense)}
  .sync-panel{padding:14px 16px}
  .sync-row{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap}
  .sync-title{font-weight:700;font-size:14px}
  .sync-sub{color:var(--muted);font-size:12px;margin-top:2px}
  .btn-auth{border:0; background:linear-gradient(135deg,var(--brand),var(--brand-2)); color:#fff; padding:10px 16px; border-radius:11px; font-weight:700; font-size:13.5px; cursor:pointer; white-space:nowrap}
  .btn-auth:disabled{opacity:.6; cursor:not-allowed; background:var(--panel-2); color:var(--muted); box-shadow:inset 0 0 0 1px var(--line)}
  footer{color:var(--muted);text-align:center;font-size:12px;margin-top:8px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand"><span class="dot">₩</span> 가계부</div>
    <div class="hgroup">
      <div class="month-nav">
        <button id="prevM" title="이전 달">‹</button>
        <div class="label" id="monthLabel">—</div>
        <button id="nextM" title="다음 달">›</button>
      </div>
      <button id="themeToggle" class="icon-btn" title="라이트/다크 모드 전환">🌙</button>
    </div>
  </header>

  <section class="panel sync-panel">
    <div class="sync-row">
      <div class="sync-info">
        <div class="sync-title">☁️ 클라우드 동기화</div>
        <div class="sync-sub" id="syncSub">로그인하면 폰·PC에서 같은 기록을 봐요</div>
      </div>
      <button id="authBtn" class="btn-auth">구글 로그인</button>
    </div>
  </section>

  <section class="cards">
    <div class="card inc"><div class="k">수입</div><div class="v" id="sumIncome">₩0</div></div>
    <div class="card exp"><div class="k">지출</div><div class="v" id="sumExpense">₩0</div></div>
    <div class="card"><div class="k">잔액</div><div class="v" id="sumBalance">₩0</div></div>
  </section>

  <section class="panel">
    <h2 id="formTitle">✏️ 새 기록 <span class="sub">분류는 여러 개 선택 가능 · 내역을 누르면 수정</span></h2>
    <div class="editing-banner" id="editBanner" hidden>✏️ 기존 기록을 수정 중입니다. 값을 바꾸고 <b>수정 완료</b>를 누르세요.</div>
    <div class="seg" id="typeSeg">
      <button data-t="expense" class="active">지출</button>
      <button data-t="income">수입</button>
    </div>
    <div class="row">
      <input type="date" id="fDate" />
      <input type="text" id="fAmount" inputmode="numeric" autocomplete="off" placeholder="금액 (원)" />
    </div>
    <div class="chips" id="catChips"></div>
    <div class="row" style="grid-template-columns:1fr">
      <input type="text" id="fMemo" placeholder="메모 (선택) — 예: 점심, 스타벅스" maxlength="60" />
    </div>
    <div class="form-actions">
      <button class="btn-add" id="addBtn">추가하기</button>
      <button class="btn-cancel" id="cancelBtn" hidden>취소</button>
    </div>
  </section>

  <section class="panel">
    <h2>📒 이번 달 내역 <span class="sub" id="listCount"></span></h2>
    <div id="list"></div>
  </section>

  <section class="panel">
    <h2>📊 분류별 지출 <span class="sub" id="statTotal"></span></h2>
    <div id="stats"></div>
  </section>

  <section class="panel">
    <h2>📈 월별 지출 추이 <span class="sub">최근 6개월</span></h2>
    <svg class="trend" id="trend" viewBox="0 0 600 150" preserveAspectRatio="none" aria-hidden="true"></svg>
  </section>

  <section class="panel">
    <h2>🗂 데이터 관리</h2>
    <div class="tools">
      <button id="expJson">JSON 백업</button>
      <button id="expCsv">CSV 내보내기</button>
      <label>JSON 복원<input type="file" id="impJson" accept="application/json,.json" hidden></label>
      <button id="clearAll" class="danger">전체 삭제</button>
    </div>
    <footer>데이터는 이 브라우저에만 저장됩니다. 정기적으로 JSON 백업을 권장해요.</footer>
  </section>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const KEY = "household-ledger-v1";
  const CATS = {
    expense: [
      ["식비","🍚"],["카페/간식","☕"],["생활/마트","🛒"],["문화/여가","🎬"],
      ["의료/건강","💊"],["교육","📚"],["패션/미용","👕"],["경조사","🎁"],
      ["교통","🚌"],["쏘","❤️"],["기타","📦"]
    ],
    income: [ ["급여","💰"],["용돈","🧧"],["쏘","❤️"],["금융/이자","🏦"],["기타수입","➕"] ]
  };
  const EMO = {}; [...CATS.expense, ...CATS.income].forEach(([c,e])=>EMO[c]=e);

  // ---- state ----
  let data = load();
  let curType = "expense";
  let curCats = new Set([CATS.expense[0][0]]);
  let view = firstOfThisMonth();
  let editingId = null; // null이면 새 기록 추가, 값이 있으면 그 기록을 수정 중

  // ---- helpers ----
  function load(){
    let arr; try{ arr = JSON.parse(localStorage.getItem(KEY)) || []; }catch(e){ arr = []; }
    arr.forEach(r=>{ if(!Array.isArray(r.cats)) r.cats = r.cat ? [r.cat] : ["기타"]; }); // 예전 단일 분류 호환
    return arr;
  }
  function save(){
    localStorage.setItem(KEY, JSON.stringify(data));
    if(window.CloudSync && window.CloudSync.active) window.CloudSync.push(data); // 로그인 시 클라우드에도 반영
  }
  function firstOfThisMonth(){ const d=new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); }
  function won(n){ return "₩" + Math.round(n).toLocaleString("ko-KR"); }
  function ymd(d){ const p=x=>String(x).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); }
  function ym(d){ const p=x=>String(x).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1); }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function inView(rec){ return rec.date.slice(0,7) === ym(view); }
  function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),1800); }

  // ---- rendering ----
  function renderAll(){ renderMonth(); renderChips(); renderSummary(); renderList(); renderStats(); renderTrend(); }

  function renderMonth(){
    document.getElementById("monthLabel").textContent = view.getFullYear()+"년 "+(view.getMonth()+1)+"월";
  }

  function renderChips(){
    const box=document.getElementById("catChips"); box.innerHTML="";
    CATS[curType].forEach(([c,e])=>{
      const b=document.createElement("button");
      b.className="chip"+(curCats.has(c)?" active":"");
      b.innerHTML=`<span>${e}</span> ${c}`;
      b.onclick=()=>{ curCats.has(c)?curCats.delete(c):curCats.add(c); renderChips(); };
      box.appendChild(b);
    });
  }

  function renderSummary(){
    let inc=0, exp=0;
    data.forEach(r=>{ if(inView(r)){ r.type==="income"?inc+=r.amount:exp+=r.amount; } });
    document.getElementById("sumIncome").textContent = won(inc);
    document.getElementById("sumExpense").textContent = won(exp);
    const bal=inc-exp;
    const be=document.getElementById("sumBalance");
    be.textContent = (bal<0?"-":"") + won(Math.abs(bal));
    be.style.color = bal<0 ? "var(--expense)" : "var(--text)";
  }

  function renderList(){
    const box=document.getElementById("list");
    const rows=data.filter(inView).sort((a,b)=> b.date.localeCompare(a.date) || b.created-a.created);
    document.getElementById("listCount").textContent = rows.length ? rows.length+"건" : "";
    if(!rows.length){ box.innerHTML='<div class="empty">아직 기록이 없어요. 위에서 첫 지출을 남겨보세요 👆</div>'; return; }
    const byDay={};
    rows.forEach(r=>{ (byDay[r.date]=byDay[r.date]||[]).push(r); });
    box.innerHTML="";
    Object.keys(byDay).sort((a,b)=>b.localeCompare(a)).forEach(day=>{
      const items=byDay[day];
      let dayExp=0, dayInc=0;
      items.forEach(r=> r.type==="income"?dayInc+=r.amount:dayExp+=r.amount);
      const g=document.createElement("div"); g.className="daygroup";
      const dObj=new Date(day+"T00:00:00");
      const wd=["일","월","화","수","목","금","토"][dObj.getDay()];
      const parts=[]; if(dayExp) parts.push("지출 "+won(dayExp)); if(dayInc) parts.push("수입 "+won(dayInc));
      g.innerHTML=`<div class="dh"><span class="d">${dObj.getMonth()+1}/${dObj.getDate()} (${wd})</span><span class="s">${parts.join(" · ")}</span></div>`;
      items.forEach(r=>{
        const el=document.createElement("div"); el.className="item"+(r.id===editingId?" editing":"");
        el.title="눌러서 수정";
        const catLabel=r.cats.map(c=>`${EMO[c]||"📦"} ${escapeHtml(c)}`).join(" · ");
        el.innerHTML=`
          <div class="emoji">${EMO[r.cats[0]]||"📦"}</div>
          <div class="meta"><div class="c">${catLabel}</div>${r.memo?`<div class="m">${escapeHtml(r.memo)}</div>`:""}</div>
          <div class="amt ${r.type}">${r.type==="income"?"+":"-"}${won(r.amount)}</div>
          <button class="del" title="삭제">✕</button>`;
        el.querySelector(".del").onclick=(e)=>{ e.stopPropagation(); del(r.id); };
        el.onclick=()=>{ startEdit(r); }; // 아이템(아이콘 포함) 아무 곳이나 누르면 수정
        g.appendChild(el);
      });
      box.appendChild(g);
    });
  }

  function renderStats(){
    const box=document.getElementById("stats");
    const map={}; let total=0;
    // 분류가 여러 개면 각 분류에 전체 금액을 반영(중복 집계) → 데이트에 얼마 썼나 등을 볼 수 있게.
    // total은 기록당 1회만 더해 실제 월 지출과 일치. 그래서 분류 비율 합이 100%를 넘을 수 있음.
    data.forEach(r=>{ if(inView(r)&&r.type==="expense"){ r.cats.forEach(c=>{ map[c]=(map[c]||0)+r.amount; }); total+=r.amount; } });
    document.getElementById("statTotal").textContent = total? "합계 "+won(total):"";
    const rows=Object.entries(map).sort((a,b)=>b[1]-a[1]);
    if(!rows.length){ box.innerHTML='<div class="empty">이번 달 지출이 없어요.</div>'; return; }
    const max=rows[0][1];
    box.innerHTML="";
    rows.forEach(([c,v])=>{
      const pct=total?Math.round(v/total*100):0;
      const w=max?Math.max(4,Math.round(v/max*100)):0;
      const row=document.createElement("div"); row.className="statrow";
      row.innerHTML=`
        <div class="lab"><span>${EMO[c]||"📦"}</span>${escapeHtml(c)}</div>
        <div class="bar"><i style="width:${w}%"></i></div>
        <div class="val"><b>${won(v)}</b> · ${pct}%</div>`;
      box.appendChild(row);
    });
  }

  function renderTrend(){
    const svg=document.getElementById("trend");
    const W=600,H=150, pad={l:8,r:8,t:14,b:22};
    const months=[];
    for(let i=5;i>=0;i--){ const d=new Date(view.getFullYear(), view.getMonth()-i, 1); months.push(d); }
    const vals=months.map(d=>{
      const k=ym(d); let s=0;
      data.forEach(r=>{ if(r.type==="expense"&&r.date.slice(0,7)===k) s+=r.amount; });
      return s;
    });
    const max=Math.max(1,...vals);
    const bw=(W-pad.l-pad.r)/months.length;
    let html="";
    // baseline
    html+=`<line class="gl" x1="${pad.l}" y1="${H-pad.b}" x2="${W-pad.r}" y2="${H-pad.b}"/>`;
    months.forEach((d,i)=>{
      const bh=(H-pad.t-pad.b)*(vals[i]/max);
      const x=pad.l+i*bw+bw*0.18, w=bw*0.64;
      const y=H-pad.b-bh;
      const cur = ym(d)===ym(view);
      html+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${Math.max(0,bh).toFixed(1)}" rx="4" fill="${cur?'var(--brand)':'var(--line)'}"/>`;
      if(vals[i]>0){ const lab=vals[i]>=10000?Math.round(vals[i]/10000)+"만":Math.round(vals[i]/1000)+"천"; html+=`<text x="${(x+w/2).toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="middle">${lab}</text>`; }
      html+=`<text x="${(x+w/2).toFixed(1)}" y="${H-6}" text-anchor="middle">${d.getMonth()+1}월</text>`;
    });
    svg.innerHTML=html;
  }

  function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  // ---- actions ----
  function add(){
    const amt=Math.round(Number(document.getElementById("fAmount").value.replace(/[^\d]/g,"")));
    const date=document.getElementById("fDate").value;
    const memo=document.getElementById("fMemo").value.trim();
    if(!date){ toast("날짜를 선택하세요"); return; }
    if(!amt || amt<=0){ toast("금액을 올바르게 입력하세요"); return; }
    const cats=Array.from(curCats);
    if(!cats.length){ toast("분류를 하나 이상 선택하세요"); return; }
    if(editingId){
      const rec=data.find(r=>r.id===editingId);
      if(rec){ rec.type=curType; rec.cats=cats; rec.amount=amt; rec.memo=memo; rec.date=date; }
      toast("수정됨 · "+won(amt));
    } else {
      data.push({ id:uid(), type:curType, cats, amount:amt, memo, date, created:Date.now() });
      toast("기록됨 · "+won(amt));
    }
    save();
    resetForm();
    // 기록(또는 수정)한 달로 이동해 바로 보이게
    view=new Date(Number(date.slice(0,4)), Number(date.slice(5,7))-1, 1);
    renderAll();
  }
  function startEdit(rec){
    editingId=rec.id;
    curType=rec.type;
    document.getElementById("typeSeg").querySelectorAll("button").forEach(x=>x.classList.toggle("active",x.dataset.t===curType));
    curCats=new Set(rec.cats);
    renderChips();
    document.getElementById("fDate").value=rec.date;
    document.getElementById("fAmount").value=Number(rec.amount).toLocaleString("ko-KR");
    document.getElementById("fMemo").value=rec.memo||"";
    document.getElementById("addBtn").textContent="수정 완료";
    document.getElementById("cancelBtn").hidden=false;
    document.getElementById("editBanner").hidden=false;
    renderList(); // 편집 중 항목 강조
    window.scrollTo({top:0, behavior:"smooth"});
  }
  function resetForm(){
    editingId=null;
    curType="expense";
    document.getElementById("typeSeg").querySelectorAll("button").forEach(x=>x.classList.toggle("active",x.dataset.t==="expense"));
    curCats=new Set([CATS.expense[0][0]]);
    renderChips();
    document.getElementById("fAmount").value="";
    document.getElementById("fMemo").value="";
    document.getElementById("addBtn").textContent="추가하기";
    document.getElementById("cancelBtn").hidden=true;
    document.getElementById("editBanner").hidden=true;
  }
  function del(id){
    if(id===editingId) resetForm(); // 수정 중이던 항목을 지우면 폼도 초기화
    data=data.filter(r=>r.id!==id); save(); renderAll();
  }

  // ---- export / import ----
  function download(name,text,type){
    const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=name; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }
  function expJson(){ download("가계부-백업-"+ymd(new Date())+".json", JSON.stringify(data,null,2), "application/json"); toast("JSON 백업 완료"); }
  function expCsv(){
    const head=["날짜","구분","분류","금액","메모"];
    const lines=[head.join(",")];
    data.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
      const cells=[r.date, r.type==="income"?"수입":"지출", r.cats.join(" / "), r.amount, r.memo||""]
        .map(v=>{ v=String(v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; });
      lines.push(cells.join(","));
    });
    download("가계부-"+ymd(new Date())+".csv", "﻿"+lines.join("\n"), "text/csv;charset=utf-8");
    toast("CSV 내보내기 완료");
  }
  function impJson(file){
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const arr=JSON.parse(rd.result);
        if(!Array.isArray(arr)) throw 0;
        const clean=arr.filter(r=>r&&r.date&&r.amount!=null).map(r=>({
          id:r.id||uid(), type:r.type==="income"?"income":"expense",
          cats: Array.isArray(r.cats)&&r.cats.length ? r.cats : [r.cat||"기타"],
          amount:Math.round(Number(r.amount))||0,
          memo:r.memo||"", date:String(r.date).slice(0,10), created:r.created||Date.now()
        }));
        if(confirm(`${clean.length}건을 불러옵니다.\n확인=기존에 합치기 / 취소=중단`)){
          const seen=new Set(data.map(r=>r.id));
          clean.forEach(r=>{ while(seen.has(r.id)) r.id=uid(); seen.add(r.id); data.push(r); });
          save(); renderAll(); toast(clean.length+"건 불러옴");
        }
      }catch(e){ toast("잘못된 파일입니다"); }
    };
    rd.readAsText(file);
  }

  // ---- wire up ----
  document.getElementById("fDate").value = ymd(new Date());
  document.getElementById("typeSeg").querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{
      curType=b.dataset.t;
      document.getElementById("typeSeg").querySelectorAll("button").forEach(x=>x.classList.toggle("active",x===b));
      curCats=new Set([CATS[curType][0][0]]); renderChips();
    };
  });
  document.getElementById("addBtn").onclick=add;
  document.getElementById("fMemo").addEventListener("keydown",e=>{ if(e.key==="Enter") add(); });
  const fAmount=document.getElementById("fAmount");
  fAmount.addEventListener("input",()=>{ // 입력하는 대로 천 단위 콤마
    const digits=fAmount.value.replace(/[^\d]/g,"");
    fAmount.value = digits ? Number(digits).toLocaleString("ko-KR") : "";
  });
  fAmount.addEventListener("keydown",e=>{ if(e.key==="Enter") add(); });
  document.getElementById("prevM").onclick=()=>{ view=new Date(view.getFullYear(),view.getMonth()-1,1); renderAll(); };
  document.getElementById("nextM").onclick=()=>{ view=new Date(view.getFullYear(),view.getMonth()+1,1); renderAll(); };
  document.getElementById("expJson").onclick=expJson;
  document.getElementById("expCsv").onclick=expCsv;
  document.getElementById("impJson").addEventListener("change",e=>{ if(e.target.files[0]) impJson(e.target.files[0]); e.target.value=""; });
  document.getElementById("clearAll").onclick=()=>{
    if(confirm("모든 기록을 삭제할까요? 되돌릴 수 없습니다.\n먼저 JSON 백업을 권장해요.")){ data=[]; save(); renderAll(); toast("전체 삭제됨"); }
  };
  document.getElementById("cancelBtn").onclick=resetForm;

  // ---- 테마(라이트/다크) 토글 ----
  const THEME_KEY="household-ledger-theme";
  function effectiveTheme(){
    return document.documentElement.getAttribute("data-theme")
      || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
  }
  function paintThemeIcon(){ document.getElementById("themeToggle").textContent = effectiveTheme()==="dark" ? "☀️" : "🌙"; }
  paintThemeIcon();
  document.getElementById("themeToggle").onclick=()=>{
    const next = effectiveTheme()==="dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    try{ localStorage.setItem(THEME_KEY, next); }catch(e){}
    paintThemeIcon();
  };

  // 클라우드 동기화 레이어(모듈 스크립트)에서 호출하는 훅
  window.LedgerApp = {
    getData(){ return data.slice(); },
    setData(entries){
      data = Array.isArray(entries) ? entries : [];
      localStorage.setItem(KEY, JSON.stringify(data));
      if(editingId && !data.some(r=>r.id===editingId)) resetForm(); // 편집 중이던 항목이 원격에서 사라졌으면 폼 정리
      renderAll();
    },
    toast(msg){ toast(msg); }
  };

  renderAll();
})();
</script>

<!-- ☁️ 클라우드 동기화 (Firebase) — 아래 firebaseConfig에 본인 프로젝트 값을 붙여넣으면 활성화됩니다 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
           setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { initializeFirestore, getFirestore, persistentLocalCache, persistentSingleTabManager,
           doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  // ↓↓↓ Firebase 콘솔에서 만든 웹앱 설정값으로 교체하세요 (공개 저장소에 올려도 안전한 값입니다) ↓↓↓
  const firebaseConfig = {
    apiKey: "AIzaSyB162rJYfWKA0YWV_0DK09hw2wzUZImw6U",
    authDomain: "household-ledger-b6042.firebaseapp.com",
    projectId: "household-ledger-b6042",
    storageBucket: "household-ledger-b6042.firebasestorage.app",
    messagingSenderId: "853229218804",
    appId: "1:853229218804:web:b127147fdf072ebdf5a7a1"
  };
  // ↑↑↑ 여기까지 교체 ↑↑↑

  const App = window.LedgerApp;
  const authBtn = document.getElementById("authBtn");
  const syncSub = document.getElementById("syncSub");
  const setSub = (t)=>{ syncSub.textContent = t; };
  const configured = firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf("PASTE") !== 0;

  if(!configured){
    setSub("설정 필요 · README의 'Firebase 설정' 참고 (지금은 이 기기에만 저장)");
    authBtn.textContent = "설정 필요";
    authBtn.disabled = true;
  } else {
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    let db;
    try {
      db = initializeFirestore(app, { localCache: persistentLocalCache({ tabManager: persistentSingleTabManager() }) });
    } catch(e){ db = getFirestore(app); }

    let userDocRef = null, unsub = null;
    window.CloudSync = {
      get active(){ return !!userDocRef; },
      async push(entries){
        if(!userDocRef) return;
        try { await setDoc(userDocRef, { entries, updatedAt: Date.now() }); }
        catch(e){ App.toast("동기화 오류 (오프라인이면 자동 재시도)"); }
      }
    };

    setPersistence(auth, browserLocalPersistence).catch(()=>{});

    authBtn.onclick = async () => {
      if(auth.currentUser){
        if(confirm("로그아웃할까요? 이 기기에는 마지막 기록이 그대로 남아있어요.")) await signOut(auth);
      } else {
        try { await signInWithPopup(auth, new GoogleAuthProvider()); }
        catch(e){ App.toast("로그인이 취소됐어요"); }
      }
    };

    onAuthStateChanged(auth, async (user) => {
      if(unsub){ unsub(); unsub = null; }
      if(user){
        userDocRef = doc(db, "ledgers", user.uid);
        authBtn.textContent = "로그아웃";
        authBtn.disabled = false;
        setSub("☁️ 동기화 중 · " + (user.email || user.displayName || "로그인됨"));
        try {
          const snap = await getDoc(userDocRef);
          if(snap.exists() && Array.isArray(snap.data().entries)){
            const cloud = snap.data().entries;
            const cloudIds = new Set(cloud.map(e=>e.id));
            const extra = App.getData().filter(e=> e && !cloudIds.has(e.id)); // 이 기기에만 있는 기록
            if(extra.length && confirm(`이 기기에만 있는 기록 ${extra.length}건을 클라우드에 합칠까요?\n확인=합치기 / 취소=클라우드 기록만 사용`)){
              const merged = cloud.concat(extra);
              await setDoc(userDocRef, { entries: merged, updatedAt: Date.now() });
              App.setData(merged);
            } else {
              App.setData(cloud);
            }
          } else {
            // 최초 로그인: 이 기기의 기존 기록을 클라우드로 올림
            const local = App.getData();
            await setDoc(userDocRef, { entries: local, updatedAt: Date.now() });
            App.setData(local);
          }
        } catch(e){ App.toast("클라우드 불러오기 실패"); }
        // 실시간 구독: 다른 기기의 변경이 자동 반영됨
        unsub = onSnapshot(userDocRef, (d)=>{
          const e = (d.exists() && Array.isArray(d.data().entries)) ? d.data().entries : [];
          App.setData(e);
        });
      } else {
        userDocRef = null;
        authBtn.textContent = "구글 로그인";
        authBtn.disabled = false;
        setSub("로그인하면 폰·PC에서 같은 기록을 봐요");
      }
    });
  }
</script>
</body>
</html>
